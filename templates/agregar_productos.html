<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
</head>

<h2>Agregar productos a factura {{ factura.id }}</h2>
<form method="post">
    <table border="1">
        <tr>
            <th>Producto</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Cantidad</th>
        </tr>
        {% for p in productos %}
        <tr>
            <td>
                <input type="checkbox" name="producto_id" value="{{ p.id }}"> {{ p.descripcion }}
            </td>
            <td>{{ p.precio }}</td>
            <td>{{ p.stock }}</td>
            <td>
                <input type="number" name="cantidad_{{ p.id }}" min="1" max="{{ p.stock }}" value="1">
            </td>
        </tr>
        {% endfor %}
    </table>
    <br>
    <button class="btn btn-outline-success" type="submit">Confirmar</button>
    <a class="btn btn-danger" href="{{ url_for('listaFacturas') }}">Cancelar</a>
</form>
