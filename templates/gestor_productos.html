<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
</head>

<body>
    <h1>Nuevo Producto</h1>
    <form action="{{ url_for('agregar_producto') }}" method="post">
        Descripción: <input type="text" name="descripcion" required> Precio: <input type="number" name="precio" required> Stock: <input type="number" name="stock" required>
        <hr>
        <a class="btn btn-outline-success" type="submit">Agregar</a>
        <a href="{{ url_for('listaProductos') }}" class="btn btn-primary">Volver</a>
    </form>
    <ul>
        {% for producto in productos %}
        <li>{{ producto.descripcion }} - {{ producto.precio }} - {{ producto.stock }}
            <a href="{{ url_for('eliminar_producto', id=producto.id) }}">Eliminar</a>
        </li>
        {% endfor %}
    </ul>
</body>
