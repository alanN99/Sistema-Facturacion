<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Clientes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #f4f6f9;
        }
        
        .client-box {
            max-width: 800px;
            margin: 50px auto;
        }
        
        table th,
        table td {
            vertical-align: middle !important;
        }
    </style>
</head>

<body class="hold-transition">

    <div class="client-box">
        <div class="card card-outline card-primary">
            <div class="card-header text-center">
                <h3 class="card-title">Nuevo Cliente</h3>
            </div>
            <div class="card-body">
                <form action="{{ url_for('nuevo_cliente') }}" method="post" class="mb-4">
                    <div class="row mb-3">
                        <div class="col">
                            <input type="text" name="nombre" class="form-control" placeholder="Nombre" required>
                        </div>
                        <div class="col">
                            <input type="text" name="direccion" class="form-control" placeholder="Dirección" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col">
                            <input type="number" name="telefono" class="form-control" placeholder="Teléfono" required>
                        </div>
                        <div class="col">
                            <input type="email" name="email" class="form-control" placeholder="Email" required>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('listaClientes') }}" class="btn btn-primary">
                            <i class="fas fa-arrow-left"></i> Volver
                        </a>
                        <button type="submit" class="btn btn-success">
                        <i class="fas fa-plus"></i> Agregar
                    </button>
                    </div>
                </form>

                <h4>Clientes existentes</h4>
                <div class="table-responsive">
                    <table class="table table-hover text-nowrap">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Dirección</th>
                                <th>Teléfono</th>
                                <th>Email</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for c in clientes %}
                            <tr>
                                <td>{{ c.nombre }}</td>
                                <td>{{ c.direccion }}</td>
                                <td>{{ c.telefono }}</td>
                                <td>{{ c.email }}</td>
                                <td>
                                    <a href="{{ url_for('editar_cliente', id=c.id) }}" class="btn btn-warning btn-sm">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <a href="{{ url_for('eliminar_cliente', id=c.id) }}" class="btn btn-danger btn-sm">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>

</html>
