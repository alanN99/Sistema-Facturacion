<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Facturas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #f4f6f9;
        }
        
        .invoice-box {
            max-width: 600px;
            margin: 50px auto;
        }
    </style>
</head>

<body class="hold-transition">

    <div class="invoice-box">
        <div class="card card-outline card-info">
            <div class="card-header text-center">
                <h3 class="card-title">Nueva Factura</h3>
            </div>
            <div class="card-body">
                <form action="{{ url_for('nueva_factura') }}" method="post">
                    <div class="form-group mb-3">
                        <label for="id_cliente">Selecciona un cliente:</label>
                        <select id="id_cliente" name="id_cliente" class="form-control" required>
                        <option value="" disabled selected>-- Selecciona un cliente --</option>
                        {% for c in clientes %}
                            <option value="{{ c.id }}">{{ c.nombre }}</option>
                        {% endfor %}
                    </select>
                    </div>
                    <div class="d-flex justify-content-between mt-4">
                        <a href="{{ url_for('listaFacturas') }}" class="btn btn-danger">
                            <i class="fas fa-arrow-left"></i> Volver a Inicio
                        </a>
                        <button type="submit" class="btn btn-primary">
                        <i class="fas fa-arrow-right"></i> Continuar
                    </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>

</html>
