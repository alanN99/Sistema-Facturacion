<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
</head>

<body>
    <h1>Registro de Usuarios</h1>
    <form action="{{ url_for('agregar_usuario') }}" method="post">
        Nombre: <input type="text" name="username" required>
        <br> Password: <input type="password" name="password" required>
        <br> Rol:
        <select name="rol" required>
            <option value="1">Administrador</option>
            <option value="2">Usuario</option>
        </select>
        <br>
        <button class="btn btn-primary" type="submit">Agregar</button>
    </form>
    <hr>
    <h3>Ya tienes usuario?</h3>
    <a type="button" class="btn btn-outline-dark" href="{{ url_for('login') }}">Iniciar sesión</a>
    <ul>
        {% for usuario in usuarios %}
        <li>{{ usuario.username }} - {{ usuario.password }}
            <a href="{{ url_for('eliminar_usuario', id=usuario.id) }}">Eliminar</a>
        </li>
        {% endfor %}
    </ul>
</body>

</html>
