<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Productos a Factura</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #f4f6f9;
        }
        
        .invoice-box {
            max-width: 900px;
            margin: 50px auto;
        }
        
        table th,
        table td {
            vertical-align: middle !important;
        }
    </style>
</head>

<body class="hold-transition">

    <div class="invoice-box">
        <div class="card card-outline card-info">
            <div class="card-header text-center">
                <h3 class="card-title">Agregar productos a Factura #{{ factura.id }}</h3>
            </div>
            <div class="card-body table-responsive p-0">
                <form method="post">
                    <table class="table table-hover text-nowrap">
                        <thead>
                            <tr>
                                <th>Seleccionar</th>
                                <th>Producto</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Cantidad</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for p in productos %}
                            <tr>
                                <td>
                                    <input type="checkbox" name="producto_id" value="{{ p.id }}">
                                </td>
                                <td>{{ p.descripcion }}</td>
                                <td>{{ p.precio }}</td>
                                <td>{{ p.stock }}</td>
                                <td>
                                    <input type="number" name="cantidad_{{ p.id }}" min="1" max="{{ p.stock }}" value="1" class="form-control" style="width: 80px;">
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                    <div class="mt-3 d-flex justify-content-between">
                        <a href="{{ url_for('listaFacturas') }}" class="btn btn-danger">
                            <i class="fas fa-times"></i> Cancelar
                        </a>
                        <button type="submit" class="btn btn-success">
                        <i class="fas fa-check"></i> Confirmar
                    </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>

</html>
