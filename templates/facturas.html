<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="hold-transition sidebar-mini">
    <div class="wrapper">

        <div class="content-wrapper p-4">
            <h1 class="mb-3">Facturas</h1>

            <div class="card">
                <div class="card-header bg-info text-white">
                    <h3 class="card-title">Listado de facturas</h3>
                </div>
                <div class="card-body table-responsive p-0">
                    <table class="table table-hover text-nowrap">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Cliente</th>
                                <th>Fecha</th>
                                <th>Total</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for f in facturas %}
                            <tr>
                                <td>{{ f.id }}</td>
                                <td>{{ f.id_cliente }}</td>
                                <td>{{ f.fecha }}</td>
                                <td>{{ f.total }}</td>
                                <td>
                                    <a href="{{ url_for('consultar_factura', id=f.id) }}" class="btn btn-primary btn-sm">
                                        <i class="fas fa-eye"></i> Detalle
                                    </a>
                                    <a href="{{ url_for('eliminar_factura', id=f.id) }}" class="btn btn-danger btn-sm">
                                        <i class="fas fa-trash"></i> Eliminar
                                    </a>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
                <div class="card-footer">
                    <a href="{{ url_for('nueva_factura') }}" class="btn btn-success">Nueva Factura</a>
                    <a href="{{ url_for('dashboard') }}" class="btn btn-primary">Volver</a>
                </div>
            </div>
        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>

</html>
