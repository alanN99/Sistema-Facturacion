<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
</head>

<body>
    <h1>Ingreso usuarios</h1>

    <form action="/login" method="POST">
        <label for="usuario">Usuario:</label>
        <input type="text" id="username" name="username" required>
        <br>
        <label for="contraseña">Contraseña:</label>
        <input type="password" id="password" name="password" required>
        <br>
        <button class="btn btn-primary" type="submit">Iniciar Sesión</button>
    </form>
    <div class="row justify-content-center">
        <div class="col-12">
            {% with messages = get_flashed_messages(with_categories=true) %} {% if messages %} {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dissmissible fade show" role="alert">
                {{ message }}
            </div>
            {% endfor %} {% endif %} {% endwith %}
        </div>
    </div>
    <hr>
    <h3>No tienes usuario?</h3>
    <a type="button" class="btn btn-outline-dark" href="{{ url_for('agregar_usuario') }}">Registrate acá</a>
</body>

</html>
