<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Productos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #f4f6f9;
        }
        
        .product-box {
            max-width: 800px;
            margin: 50px auto;
        }
        
        table th,
        table td {
            vertical-align: middle !important;
        }
    </style>
</head>

<body class="hold-transition">

    <div class="product-box">
        <div class="card card-outline card-success">
            <div class="card-header text-center">
                <h3 class="card-title">Nuevo Producto</h3>
            </div>
            <div class="card-body">
                <form action="{{ url_for('agregar_producto') }}" method="post" class="mb-4">
                    <div class="row mb-3">
                        <div class="col">
                            <input type="text" name="descripcion" class="form-control" placeholder="Descripción" required>
                        </div>
                        <div class="col">
                            <input type="number" step="0.01" name="precio" class="form-control" placeholder="Precio" required>
                        </div>
                        <div class="col">
                            <input type="number" name="stock" class="form-control" placeholder="Stock" required>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('listaProductos') }}" class="btn btn-primary">
                            <i class="fas fa-arrow-left"></i> Volver
                        </a>
                        <button type="submit" class="btn btn-success">
                        <i class="fas fa-plus"></i> Agregar
                    </button>
                    </div>
                </form>

                <h4>Productos existentes</h4>
                <div class="table-responsive">
                    <table class="table table-hover text-nowrap">
                        <thead>
                            <tr>
                                <th>Descripción</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for p in productos %}
                            <tr>
                                <td>{{ p.descripcion }}</td>
                                <td>{{ p.precio }}</td>
                                <td>{{ p.stock }}</td>
                                <td>
                                    <a href="{{ url_for('editar_producto', id=p.id) }}" class="btn btn-warning btn-sm">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <a href="{{ url_for('eliminar_producto', id=p.id) }}" class="btn btn-danger btn-sm">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>

</html>
